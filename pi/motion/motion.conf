# BirdPi - Motion 4.7 config
# Optimise pour Raspberry Pi 2 Model B (ARMv7, 1GB RAM)
# Parametres calibres par pipeline d'analyse (2026-03-04)

daemon on
pid_file /home/pi/birdpi/motion.pid

# Camera - 10fps pour Pi 2 (aligne sur CAM_FPS dans config.env)
# 15fps gaspille ~30% CPU car ffmpeg ne consomme que 10fps
videodevice /dev/video0
width 640
height 480
framerate 10

# Stream MJPEG (source pour ffmpeg + telegram)
stream_port 8081
stream_localhost off
stream_maxrate 10
stream_quality 75

# Detection - parametres calibres
threshold 3043
minimum_motion_frames 3
lightswitch_percent 60
noise_level 40
event_gap 30

# Capture (utile uniquement si ffmpeg_output_movies est reactive)
pre_capture 0
post_capture 0

# Enregistrement - desactive pour economiser CPU/SD sur Pi 2
output_pictures off
ffmpeg_output_movies off

# Repertoire de sortie (si ffmpeg_output_movies reactive)
target_dir /home/pi/birdpi/recordings

# Hooks
on_event_start /home/pi/birdpi/on_event_start.sh
on_event_end /home/pi/birdpi/on_event_end.sh
