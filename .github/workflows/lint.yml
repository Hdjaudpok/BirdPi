name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on Pi scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './pi'
          additional_files: 'tools/setup.sh tools/deploy.sh'

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python syntax
        run: |
          python -m py_compile pi/app/telegram_sender.py
          python -m py_compile pi/app/battery_monitor.py
          python -m py_compile training/prepare_dataset.py
          python -m py_compile training/train.py
          python -m py_compile training/export_onnx.py
          python -m py_compile training/evaluate.py
